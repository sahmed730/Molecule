services:
  - type: web
    name: molecule-ai-engine
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
